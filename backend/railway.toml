[build]
builder = "nixpacks"
buildCommand = "pip install -r requirements.txt"

[deploy]
startCommand = "python manage.py migrate --no-input && python manage.py collectstatic --no-input && gunicorn breathe.wsgi --bind 0.0.0.0:$PORT --log-file - --workers 2"
healthcheckPath = "/api/auth/login/"
healthcheckTimeout = 100
restartPolicyType = "on_failure"

[environments.production]
variables = { DJANGO_SETTINGS_MODULE = "breathe.settings.production", PYTHONPATH = "/app" }
